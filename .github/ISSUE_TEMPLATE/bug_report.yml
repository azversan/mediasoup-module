name: Bug Report
description: Report a reproducible bug in @azversan/mediasoup
title: '[Bug]: '
labels:
  - bug
  - triage
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! 🐛
        Please fill out as much detail as possible so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched [existing issues](https://github.com/azversan/mediasoup-module/issues) and this bug has not already been reported.
          required: true
        - label: I am using the latest version of `@azversan/mediasoup`.
          required: true
        - label: I have read the [README](https://github.com/azversan/mediasoup-module#readme).
          required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Output of `npm list @azversan/mediasoup`
      placeholder: 'e.g. 0.0.2-alpha.0'
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: 'e.g. v20.14.0'
    validations:
      required: true

  - type: input
    id: nestjs-version
    attributes:
      label: NestJS version
      placeholder: 'e.g. 11.0.5'
    validations:
      required: true

  - type: input
    id: mediasoup-version
    attributes:
      label: mediasoup version
      placeholder: 'e.g. 3.19.22'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: 'e.g. Ubuntu 22.04 / macOS 14 / Windows 11'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: When I call `createRouter()` with no workers available, the error message is misleading…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, reproducible sequence of steps.
      placeholder: |
        1. Register `MediasoupModule.register(...)` with `workerCount: 0`
        2. Call `mediasoupService.createRouter()`
        3. Observe the error thrown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: A `MediasoupException` with the message "No workers available" should be thrown.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: 'A generic `TypeError: Cannot read properties of undefined` is thrown instead.'
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Please provide a link to a GitHub repository, StackBlitz, or a self-contained code snippet
        that reproduces the issue. Issues without a reproduction are likely to be closed.
      placeholder: 'https://github.com/your/reproduction-repo'

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any relevant log output or stack traces here.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might help us understand the bug (config snippets, environment details, etc.).
